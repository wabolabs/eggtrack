<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eggGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE082;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F5F5F5"/>
  
  <!-- Egg shape -->
  <ellipse cx="100" cy="110" rx="50" ry="65" fill="url(#eggGradient)" filter="url(#shadow)"/>
  
  <!-- Egg highlight -->
  <ellipse cx="85" cy="90" rx="15" ry="20" fill="rgba(255,255,255,0.4)" transform="rotate(-30 85 90)"/>
  
  <!-- Chicken comb -->
  <path d="M 90 55 Q 85 40 95 35 Q 100 45 105 35 Q 115 40 110 55" fill="#FF5722"/>
  <path d="M 95 50 Q 92 38 98 33 Q 102 42 106 33 Q 112 38 108 50" fill="#FF7043"/>
  
  <!-- Chicken face -->
  <circle cx="82" cy="95" r="6" fill="#333"/>
  <circle cx="118" cy="95" r="6" fill="#333"/>
  <circle cx="84" cy="93" r="2" fill="#FFF"/>
  <circle cx="120" cy="93" r="2" fill="#FFF"/>
  
  <!-- Beak -->
  <polygon points="100,100 95 110 105 110" fill="#FFB74D"/>
  
  <!-- Wattle -->
  <ellipse cx="100" cy="118" rx="5" ry="8" fill="#FF5722"/>
  
  <!-- Feather details -->
  <path d="M 50 100 Q 60 90 70 100" stroke="#FFE082" stroke-width="3" fill="none"/>
  <path d="M 130 100 Q 140 90 150 100" stroke="#FFE082" stroke-width="3" fill="none"/>
  <path d="M 55 120 Q 65 110 75 120" stroke="#FFE082" stroke-width="3" fill="none"/>
  <path d="M 125 120 Q 135 110 145 120" stroke="#FFE082" stroke-width="3" fill="none"/>
  
  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#667eea">EggTrack</text>
</svg>
