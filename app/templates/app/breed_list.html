{% extends 'app/base.html' %}

{% block content %}
<a href="{% url 'breed_add' %}" style="display: inline-block; margin-bottom: 20px; padding: 12px 24px; background: #4CAF50; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">Add New Breed</a>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {% for breed in breeds %}
        <tr>
            <td><strong>{{ breed.name }}</strong></td>
            <td>{{ breed.description|default:"-" }}</td>
            <td>{{ breed.created_at|date:'M d, Y' }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
