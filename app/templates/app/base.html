<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; margin-bottom: 20px; }
        nav { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        nav a { margin-right: 20px; text-decoration: none; color: #fff; font-weight: bold; transition: opacity 0.3s; }
        nav a:hover { opacity: 0.8; }
        .logo { height: 40px; margin-right: 15px; vertical-align: middle; }
        .hen-item { padding: 15px; margin: 10px 0; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .hen-item input { margin-right: 10px; }
        .logged { background: #e8f5e9; }
        button { padding: 12px 24px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        tr:hover { background: #f5f5f5; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .filters { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .filters label { margin-right: 10px; font-weight: bold; }
        .filters select { padding: 8px; margin-right: 20px; border: 1px solid #ddd; border-radius: 4px; }
        .stats-summary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(102,126,234,0.3); }
        .stats-summary h2 { margin: 0; }
        .date-input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .hen-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid #4CAF50; }
        .no-photo { width: 60px; height: 60px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 3px solid #4CAF50; }
        .upload-btn { background: #2196F3; margin-top: 10px; }
        .upload-btn:hover { background: #1976D2; }
    </style>
</head>
<body>
    <nav>
        <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="60" rx="35" ry="30" fill="#FFB74D"/>
            <ellipse cx="50" cy="60" rx="25" ry="20" fill="#FFF3E0"/>
            <circle cx="38" cy="52" r="4" fill="#333"/>
            <circle cx="62" cy="52" r="4" fill="#333"/>
            <polygon points="50,35 45,20 55,20" fill="#FF5722"/>
            <path d="M 30 70 Q 20 80 30 85" stroke="#FF5722" stroke-width="3" fill="none"/>
            <path d="M 70 70 Q 80 80 70 85" stroke="#FF5722" stroke-width="3" fill="none"/>
        </svg>
        <a href="{% url 'daily_log' %}">Daily Log</a>
        <a href="{% url 'hen_list' %}">Hens</a>
        <a href="{% url 'edit_history' %}">Edit History</a>
        <a href="{% url 'stats' %}">Stats</a>
        <a href="{% url 'breed_list' %}">Breeds</a>
        <a href="{% url 'color_list' %}">Colors</a>
        {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" style="float: right; margin-left: 20px;">Logout ({{ user.username }})</a>
        {% endif %}
    </nav>
    <h1>{{ title }}</h1>
    {% block content %}{% endblock %}
</body>
</html>
